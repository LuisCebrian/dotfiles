set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# Makes FocusGained, FocusLost work on vim inside tmux
set -g focus-events on

# Enables shift + Enter to work on pi coding agent
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'tmux*:extkeys'
set -g extended-keys on
set -g extended-keys-format csi-u

######################
#### KEYBINDINGS #####
######################

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Resize panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Reload config
bind r source-file ~/.tmux.conf

# Toggle layout between vertical (top/bottom) and horizontal (left/right)
bind S if-shell '[ $(tmux list-panes -F "##{pane_top}" | sort -u | wc -l) -gt 1 ]' \
    'select-layout even-horizontal' \
    'select-layout even-vertical'

# Swap current pane with another:
# - If only 2 panes, swap immediately with the other one
# - Otherwise show pane numbers and swap with the one pressed
bind s if-shell '[ $(tmux list-panes | wc -l) -eq 2 ]' \
    'swap-pane -s "{next}"' \
    'display-panes -d 0 "swap-pane -t %%"'

# Toggle Claude Code pane at bottom
bind C run-shell '\
  pane_id=$(tmux list-panes -F "#{pane_id} #{pane_start_command}" | grep -w "claude" | head -1 | cut -d" " -f1); \
  if [ -n "$pane_id" ]; then \
    tmux kill-pane -t "$pane_id"; \
  else \
    tmux split-window -v -l 30% -c "#{pane_current_path}" "claude"; \
  fi'

# Open Lazy Git floating window
bind G display-popup \
    -d "#{pane_current_path}" \
    -w 80% \
    -h 80% \
    -E "lazygit"

# Open zsh floating window
bind f display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "zsh"

# Vim mode
setw -g mode-keys vi
unbind [
bind Escape copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
set -sg escape-time 0
######################
###### PLUGINS #######
######################

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Continuum: auto-save every 15 min and auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_show_datetime 0

# Run plugin manager
run '~/.tmux/plugins/tpm/tpm'
